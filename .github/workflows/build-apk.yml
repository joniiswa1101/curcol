name: Build APK with EAS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile (development/preview/production)"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.x

      - name: Install dependencies
        working-directory: ./artifacts/corpchat-mobile
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Build APK with EAS
        working-directory: ./artifacts/corpchat-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-result
          path: |
            artifacts/corpchat-mobile/build-*.log
            artifacts/corpchat-mobile/*.apk
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "=== EAS Build Summary ==="
          echo "Profile: ${{ inputs.profile }}"
          echo "Build Status: Check logs above"
          echo ""
          echo "To download APK:"
          echo "1. Go to Actions tab"
          echo "2. Find 'Build APK with EAS' workflow"
          echo "3. Download 'apk-build-result' artifact"
