<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo 2: People Network (Collaboration) -->
  <!-- Background subtle shape -->
  <circle cx="55" cy="60" r="48" fill="url(#purpleGrad2)" opacity="0.08"/>
  
  <!-- Connection lines (network) -->
  <line x1="35" y1="45" x2="75" y2="45" stroke="url(#purpleGrad2)" stroke-width="1.5" opacity="0.4"/>
  <line x1="35" y1="45" x2="55" y2="75" stroke="url(#purpleGrad2)" stroke-width="1.5" opacity="0.4"/>
  <line x1="75" y1="45" x2="55" y2="75" stroke="url(#purpleGrad2)" stroke-width="1.5" opacity="0.4"/>
  <line x1="55" y1="75" x2="30" y2="80" stroke="url(#purpleGrad2)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Node 1 (top-left) - Person -->
  <circle cx="35" cy="45" r="7" fill="url(#purpleGrad2)"/>
  <circle cx="35" cy="35" r="4" fill="url(#purpleGrad2)"/>
  
  <!-- Node 2 (top-right) - Person -->
  <circle cx="75" cy="45" r="7" fill="url(#purpleGrad2)"/>
  <circle cx="75" cy="33" r="4" fill="url(#purpleGrad2)"/>
  
  <!-- Node 3 (bottom-center) - Person (larger, main) -->
  <circle cx="55" cy="75" r="8" fill="url(#purpleGrad2)"/>
  <circle cx="55" cy="62" r="5" fill="url(#purpleGrad2)"/>
  
  <!-- Node 4 (bottom-left) - smaller person -->
  <circle cx="30" cy="80" r="6" fill="url(#purpleGrad2)" opacity="0.8"/>
  <circle cx="30" cy="71" r="3.5" fill="url(#purpleGrad2)" opacity="0.8"/>
  
  <!-- Wordmark: CurCol -->
  <text x="120" y="75" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#000000" letter-spacing="-0.5">CurCol</text>
  
  <!-- Tagline -->
  <text x="120" y="100" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#000000" letter-spacing="0.5">TEAM • TALK • TOGETHER</text>
</svg>
