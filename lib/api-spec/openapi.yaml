openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: CorpChat - Internal Employee Messaging Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User/Employee management
  - name: conversations
    description: Conversation (direct & group chat) management
  - name: messages
    description: Message operations
  - name: audit
    description: Audit log operations
  - name: cico
    description: Check-In Check-Out status
  - name: files
    description: File attachment operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with employee credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all employees/users
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, email, or department
        - name: department
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile (admin or self)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/deactivate:
    post:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate a user account (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # CICO Status
  /cico/status:
    get:
      operationId: getCicoStatuses
      tags: [cico]
      summary: Get CICO status for all employees
      responses:
        "200":
          description: CICO statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CicoStatusListResponse"

  /cico/status/{employeeId}:
    get:
      operationId: getCicoStatus
      tags: [cico]
      summary: Get CICO status for a specific employee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CICO status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CicoStatus"

  /cico/checkin:
    post:
      operationId: cicoCheckIn
      tags: [cico]
      summary: Manual check-in (sync or simulate CICO)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CicoCheckInRequest"
      responses:
        "200":
          description: Check-in recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CicoStatus"

  /cico/checkout:
    post:
      operationId: cicoCheckOut
      tags: [cico]
      summary: Manual check-out (sync or simulate CICO)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CicoCheckOutRequest"
      responses:
        "200":
          description: Check-out recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CicoStatus"

  # Conversations
  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations for current user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationsListResponse"

    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation (direct or group)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation details
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

    patch:
      operationId: updateConversation
      tags: [conversations]
      summary: Update group conversation info (name, description)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationRequest"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{conversationId}/members:
    get:
      operationId: getConversationMembers
      tags: [conversations]
      summary: Get members of a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembersListResponse"

    post:
      operationId: addConversationMember
      tags: [conversations]
      summary: Add member to group conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "200":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /conversations/{conversationId}/members/{userId}:
    delete:
      operationId: removeConversationMember
      tags: [conversations]
      summary: Remove member from group conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /conversations/{conversationId}/pin:
    post:
      operationId: togglePinConversation
      tags: [conversations]
      summary: Pin or unpin a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pin toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Messages
  /conversations/{conversationId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
        - name: before
          in: query
          schema:
            type: integer
          description: Get messages before this message ID (pagination)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesListResponse"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{messageId}:
    patch:
      operationId: editMessage
      tags: [messages]
      summary: Edit a message (soft edit, keeps original for audit)
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageRequest"
      responses:
        "200":
          description: Message edited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Soft-delete a message (kept in audit log)
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message deleted (soft)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/{messageId}/reactions:
    post:
      operationId: addReaction
      tags: [messages]
      summary: Add emoji reaction to a message
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddReactionRequest"
      responses:
        "200":
          description: Reaction added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

    delete:
      operationId: removeReaction
      tags: [messages]
      summary: Remove emoji reaction from a message
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddReactionRequest"
      responses:
        "200":
          description: Reaction removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/{messageId}/pin:
    post:
      operationId: pinMessage
      tags: [messages]
      summary: Pin a message in a conversation
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message pinned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

    delete:
      operationId: unpinMessage
      tags: [messages]
      summary: Unpin a message
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message unpinned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /conversations/{conversationId}/pinned:
    get:
      operationId: getPinnedMessages
      tags: [messages]
      summary: Get pinned messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pinned messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesListResponse"

  /messages/search:
    get:
      operationId: searchMessages
      tags: [messages]
      summary: Search messages across all conversations
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: conversationId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesListResponse"

  # Announcements
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [conversations]
      summary: List company-wide announcements
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Announcements list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementsListResponse"

    post:
      operationId: createAnnouncement
      tags: [conversations]
      summary: Create announcement (admin/manager only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementRequest"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  # Audit Logs
  /audit/logs:
    get:
      operationId: getAuditLogs
      tags: [audit]
      summary: Get audit logs (admin only)
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: conversationId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogsListResponse"

  /audit/conversations/{conversationId}/export:
    get:
      operationId: exportConversation
      tags: [audit]
      summary: Export conversation history (admin only)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: Exported conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"

  /audit/stats:
    get:
      operationId: getAuditStats
      tags: [audit]
      summary: Get audit statistics dashboard (admin only)
      responses:
        "200":
          description: Audit statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditStats"

  # File uploads
  /files/upload:
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload a file attachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        employeeId:
          type: string
        password:
          type: string
      required:
        - employeeId
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, manager, employee]
        isActive:
          type: boolean
        cicoStatus:
          $ref: "#/components/schemas/CicoStatus"
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - employeeId
        - name
        - email
        - role
        - isActive
        - createdAt

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        department:
          type: string
        position:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
          enum: [admin, manager, employee]
        isActive:
          type: boolean

    UsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    CicoStatus:
      type: object
      properties:
        employeeId:
          type: string
        userId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [present, break, wfh, absent, off]
        checkInTime:
          type: string
          format: date-time
          nullable: true
        checkOutTime:
          type: string
          format: date-time
          nullable: true
        location:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required:
        - employeeId
        - status
        - updatedAt

    CicoStatusListResponse:
      type: object
      properties:
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/CicoStatus"
      required:
        - statuses

    CicoCheckInRequest:
      type: object
      properties:
        employeeId:
          type: string
        location:
          type: string
        type:
          type: string
          enum: [office, wfh]
      required:
        - employeeId
        - type

    CicoCheckOutRequest:
      type: object
      properties:
        employeeId:
          type: string
      required:
        - employeeId

    Conversation:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [direct, group, announcement]
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdById:
          type: integer
          nullable: true
        lastMessage:
          $ref: "#/components/schemas/Message"
          nullable: true
        memberCount:
          type: integer
        unreadCount:
          type: integer
        isPinned:
          type: boolean
        isMuted:
          type: boolean
        members:
          type: array
          items:
            $ref: "#/components/schemas/ConversationMember"
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - memberCount
        - unreadCount
        - isPinned
        - isMuted
        - createdAt
        - updatedAt

    ConversationMember:
      type: object
      properties:
        userId:
          type: integer
        user:
          $ref: "#/components/schemas/User"
          nullable: true
        role:
          type: string
          enum: [admin, member]
        joinedAt:
          type: string
          format: date-time
      required:
        - userId
        - role
        - joinedAt

    MembersListResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/ConversationMember"
      required:
        - members

    CreateConversationRequest:
      type: object
      properties:
        type:
          type: string
          enum: [direct, group]
        memberIds:
          type: array
          items:
            type: integer
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required:
        - type
        - memberIds

    UpdateConversationRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        avatarUrl:
          type: string

    AddMemberRequest:
      type: object
      properties:
        userId:
          type: integer
      required:
        - userId

    ConversationsListResponse:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
      required:
        - conversations

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        sender:
          $ref: "#/components/schemas/User"
          nullable: true
        content:
          type: string
          nullable: true
        type:
          type: string
          enum: [text, image, file, system]
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
          nullable: true
        replyToId:
          type: integer
          nullable: true
        replyTo:
          $ref: "#/components/schemas/Message"
          nullable: true
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/MessageReaction"
          nullable: true
        isPinned:
          type: boolean
        isEdited:
          type: boolean
        isDeleted:
          type: boolean
        deletedAt:
          type: string
          format: date-time
          nullable: true
        editedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - senderId
        - type
        - isPinned
        - isEdited
        - isDeleted
        - createdAt

    Attachment:
      type: object
      properties:
        id:
          type: integer
        fileName:
